<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Nexus Funding</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box fade-up">
    <div class="auth-logo">
      <div class="auth-logo-name gradient-text">NEXUS FUNDING</div>
      <div class="auth-logo-sub">Reset your password</div>
    </div>
    <div class="card-lg p-28">
      <div id="error-box" class="alert alert-error mb-16 hidden"></div>
      <div id="success-box" class="alert alert-success mb-16 hidden"></div>
      <form id="fp-form">
        <div class="form-group mb-16">
          <label class="label">Email Address</label>
          <input class="input" type="email" id="email" placeholder="you@email.com" required />
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="submit-btn">Send Reset Link</button>
      </form>
      <div class="text-center" style="margin-top:20px;font-size:13px;color:var(--fg2)">
        <a href="login.html" style="color:var(--cyan)">← Back to Login</a>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/core.js"></script>
<script>
document.getElementById('fp-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sending...';
  try {
    await Api.post('/auth/forgot-password', { email: document.getElementById('email').value.trim().toLowerCase() });
    document.getElementById('success-box').textContent = 'If that email exists, a reset link was sent. Check your inbox.';
    document.getElementById('success-box').classList.remove('hidden');
  } catch (err) {
    document.getElementById('error-box').textContent = err.message || 'Request failed';
    document.getElementById('error-box').classList.remove('hidden');
  } finally { btn.disabled = false; btn.textContent = 'Send Reset Link'; }
});
</script>
</body>
</html>
