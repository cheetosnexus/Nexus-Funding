<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — Nexus Funding</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrap" id="main-wrap">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">
      <div class="text-center mb-32 fade-up">
        <h1 style="font-family:var(--display);font-size:28px;font-weight:700;letter-spacing:.5px;margin-bottom:8px">🏆 Trader Leaderboard</h1>
        <p class="text-muted" style="font-size:14px">Top performing funded traders · updates every minute</p>
      </div>
      <div id="podium-wrap" class="podium-wrap"></div>
      <div class="card" id="lb-table" style="overflow:hidden">
        <div class="skeleton" style="height:300px;border-radius:0"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/core.js"></script>
<script>
initPage('/pages/leaderboard.html', { onReady: loadLeaderboard });

async function loadLeaderboard() {
  try {
    const { top, updatedAt } = await Api.get('/leaderboard');
    if (!top.length) {
      document.getElementById('lb-table').innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No Funded Traders Yet</div><div class="empty-desc">Rankings will appear once traders earn funded status and start trading.</div></div>`;
      return;
    }
    // Podium for top 3
    if (top.length >= 3) {
      const ORDER = [1,0,2]; // 2nd, 1st, 3rd
      const HEIGHTS = [120,160,100];
      const COLORS = ['#aaa','#ffd600','#cd7f32'];
      const MEDALS = ['🥇','🥈','🥉'];
      document.getElementById('podium-wrap').innerHTML = ORDER.map((idx,i) => {
        const t = top[idx];
        return `<div class="podium-item">
          <div class="podium-avatar" style="background:${COLORS[i]}22;color:${COLORS[i]};border-color:${COLORS[i]}">${Fmt.initials(t)}</div>
          <div class="podium-name">${t.firstName} ${t.lastName}</div>
          <div class="podium-pct">${Fmt.pct(t.profitPct)}</div>
          <div class="podium-bar" style="height:${HEIGHTS[i]}px;background:${COLORS[i]}0a;border-color:${COLORS[i]}44">${MEDALS[idx]}</div>
        </div>`;
      }).join('');
    }
    // Table
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('lb-table').innerHTML = `
      <div class="flex-between" style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--fg3)">
        <span>Top ${top.length} Funded Traders</span>
        <span>Updated ${updatedAt ? new Date(updatedAt).toLocaleTimeString() : '—'}</span>
      </div>
      <table class="data-table">
        <thead><tr><th>#</th><th>Trader</th><th>Account</th><th>Balance</th><th>Profit</th><th>Return</th><th>Win Rate</th><th>Days</th></tr></thead>
        <tbody>${top.map((t,i) => `<tr style="${i<3?'background:rgba(255,214,0,0.012)':''}">
          <td class="mono" style="font-size:15px;font-weight:700;color:${i<3?'var(--gold)':'var(--fg3)'};width:42px">${i<3?medals[i]:'#'+(i+1)}</td>
          <td><div style="font-weight:600;color:var(--fg);font-size:13px">${t.firstName} ${t.lastName}</div><div class="text-faint" style="font-size:11px">${t.country||'Global'}</div></td>
          <td class="mono text-muted" style="font-size:12px">$${(t.accountSize||0).toLocaleString()}</td>
          <td class="mono" style="font-weight:500;font-size:13px">${Fmt.money(t.balance,0)}</td>
          <td class="mono pnl-pos" style="font-size:13px">+${Fmt.money(t.totalProfit)}</td>
          <td class="mono pnl-pos" style="font-size:13px">+${(t.profitPct||0).toFixed(2)}%</td>
          <td class="mono" style="font-size:12px;color:${t.winRate>=60?'var(--green)':'var(--fg2)'}">${(t.winRate||0).toFixed(1)}%</td>
          <td class="mono" style="font-size:12px">${t.tradingDays||0}</td>
        </tr>`).join('')}</tbody>
      </table>`;
  } catch (err) {
    document.getElementById('lb-table').innerHTML = `<div class="alert alert-error" style="margin:16px">Failed to load leaderboard</div>`;
  }
}
setInterval(loadLeaderboard, 60000);
</script>
</body>
</html>
