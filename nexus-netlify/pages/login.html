<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Nexus Funding</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box fade-up">
    <div class="auth-logo">
      <div class="auth-logo-icon">N</div>
      <div class="auth-logo-name gradient-text">NEXUS FUNDING</div>
      <div class="auth-logo-sub">Sign in to your account</div>
    </div>

    <div class="card-lg p-28">
      <div id="error-box" class="alert alert-error mb-16 hidden"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group mb-16">
          <label class="label" for="email">Email</label>
          <input class="input" type="email" id="email" name="email" placeholder="trader@email.com" required autocomplete="email" />
        </div>
        <div class="form-group mb-16">
          <div class="flex-between mb-8">
            <label class="label" style="margin:0" for="password">Password</label>
            <a href="forgot-password.html" style="font-size:12px;color:var(--cyan)">Forgot?</a>
          </div>
          <input class="input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="submit-btn">
          Sign In
        </button>
      </form>

      <div class="text-center" style="margin-top:20px;font-size:13px;color:var(--fg2)">
        No account? <a href="register.html" style="color:var(--cyan);font-weight:600">Create one</a>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/core.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isAuth()) window.location.href = 'dashboard.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errBox = document.getElementById('error-box');
    errBox.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';

    try {
      const data = await Api.post('/auth/login', {
        email: document.getElementById('email').value.trim().toLowerCase(),
        password: document.getElementById('password').value,
      });
      Auth.save(data);
      Toast.success('Welcome back, ' + data.user.firstName + '!');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
    } catch (err) {
      errBox.textContent = err.message || 'Login failed';
      errBox.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
