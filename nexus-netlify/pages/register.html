<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Nexus Funding</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-wrap" style="padding:40px 24px">
  <div class="auth-box fade-up" style="max-width:500px">
    <div class="auth-logo">
      <div class="auth-logo-name gradient-text">NEXUS FUNDING</div>
      <div class="auth-logo-sub">Create your trader account</div>
      <div id="ref-banner" class="hidden">
        <span class="badge badge-green" style="margin-top:10px;display:inline-flex">🎉 Referral applied</span>
      </div>
    </div>

    <div class="card-lg p-28">
      <div id="error-box" class="alert alert-error mb-16 hidden"></div>

      <form id="reg-form">
        <div class="grid-2 mb-12">
          <div><label class="label">First Name</label><input class="input" id="firstName" placeholder="John" required minlength="2" /></div>
          <div><label class="label">Last Name</label><input class="input" id="lastName" placeholder="Doe" required minlength="2" /></div>
        </div>
        <div class="mb-12"><label class="label">Email</label><input class="input" type="email" id="email" placeholder="you@email.com" required /></div>
        <div class="mb-12">
          <label class="label">Country</label>
          <select class="input" id="country" required>
            <option value="">Select your country</option>
            <option>Afghanistan</option><option>Albania</option><option>Algeria</option><option>Argentina</option>
            <option>Australia</option><option>Austria</option><option>Bahrain</option><option>Bangladesh</option>
            <option>Belgium</option><option>Brazil</option><option>Canada</option><option>Chile</option>
            <option>China</option><option>Colombia</option><option>Croatia</option><option>Czech Republic</option>
            <option>Denmark</option><option>Egypt</option><option>Finland</option><option>France</option>
            <option>Germany</option><option>Ghana</option><option>Greece</option><option>Hungary</option>
            <option>India</option><option>Indonesia</option><option>Ireland</option><option>Israel</option>
            <option>Italy</option><option>Japan</option><option>Jordan</option><option>Kuwait</option>
            <option>Lebanon</option><option>Malaysia</option><option>Mexico</option><option>Morocco</option>
            <option>Netherlands</option><option>New Zealand</option><option>Nigeria</option><option>Norway</option>
            <option>Oman</option><option>Pakistan</option><option>Peru</option><option>Philippines</option>
            <option>Poland</option><option>Portugal</option><option>Qatar</option><option>Romania</option>
            <option>Russia</option><option>Saudi Arabia</option><option>Singapore</option><option>South Africa</option>
            <option>South Korea</option><option>Spain</option><option>Sweden</option><option>Switzerland</option>
            <option>Taiwan</option><option>Thailand</option><option>Tunisia</option><option>Turkey</option>
            <option>UAE</option><option>Ukraine</option><option>United Kingdom</option><option>United States</option>
            <option>Vietnam</option><option>Other</option>
          </select>
        </div>
        <div class="mb-12">
          <label class="label">Password</label>
          <input class="input" type="password" id="password" placeholder="Min 8 chars" required />
          <div id="pw-checks" class="hidden" style="display:flex;gap:12px;margin-top:7px;flex-wrap:wrap"></div>
        </div>
        <div class="mb-16">
          <label class="label">Confirm Password</label>
          <input class="input" type="password" id="confirm" placeholder="Repeat password" required />
        </div>
        <div class="flex mb-16" style="gap:10px;align-items:flex-start">
          <input type="checkbox" id="terms" style="margin-top:3px;accent-color:var(--cyan);flex-shrink:0" />
          <label for="terms" style="font-size:13px;color:var(--fg2);line-height:1.5;cursor:pointer">
            I agree to the <a href="#" style="color:var(--cyan)">Terms of Service</a> and <a href="#" style="color:var(--cyan)">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="submit-btn">Create Account →</button>
      </form>

      <div class="text-center" style="margin-top:20px;font-size:13px;color:var(--fg2)">
        Already have an account? <a href="login.html" style="color:var(--cyan);font-weight:600">Sign in</a>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/core.js"></script>
<script>
  if (Auth.isAuth()) window.location.href = 'dashboard.html';

  // Show referral code if present
  const refCode = new URLSearchParams(location.search).get('ref');
  if (refCode) document.getElementById('ref-banner').classList.remove('hidden');

  // Password strength checks
  document.getElementById('password').addEventListener('input', function() {
    const v = this.value;
    const checks = [
      { ok: v.length >= 8,       label: '8+ chars' },
      { ok: /[A-Z]/.test(v),     label: 'Uppercase' },
      { ok: /[0-9]/.test(v),     label: 'Number' },
    ];
    const wrap = document.getElementById('pw-checks');
    wrap.style.display = v ? 'flex' : 'none';
    wrap.innerHTML = checks.map(c =>
      `<span style="font-size:11px;color:${c.ok?'var(--green)':'var(--fg3)'};display:flex;align-items:center;gap:3px"><span>${c.ok?'✓':'○'}</span>${c.label}</span>`
    ).join('');
  });

  document.getElementById('reg-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errBox = document.getElementById('error-box');
    const btn = document.getElementById('submit-btn');
    errBox.classList.add('hidden');

    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    if (password !== confirm) { errBox.textContent = "Passwords don't match"; errBox.classList.remove('hidden'); return; }
    if (!/[A-Z]/.test(password) || !/[0-9]/.test(password) || password.length < 8) {
      errBox.textContent = 'Password must be 8+ chars with uppercase and number'; errBox.classList.remove('hidden'); return;
    }
    if (!document.getElementById('terms').checked) {
      errBox.textContent = 'You must accept the Terms of Service'; errBox.classList.remove('hidden'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account...';

    try {
      await Api.post('/auth/register', {
        firstName: document.getElementById('firstName').value.trim(),
        lastName:  document.getElementById('lastName').value.trim(),
        email:     document.getElementById('email').value.trim().toLowerCase(),
        country:   document.getElementById('country').value,
        password,
        referralCode: refCode || undefined,
      });

      document.querySelector('.card-lg').innerHTML = `
        <div class="text-center">
          <div style="font-size:52px;margin-bottom:16px">📧</div>
          <h2 style="font-size:20px;font-weight:600;margin-bottom:10px">Check your email!</h2>
          <p style="color:var(--fg2);font-size:14px;line-height:1.7;margin-bottom:24px">
            We sent a verification link to <strong style="color:var(--fg)">${document.getElementById('email').value}</strong>.
            Click it to activate your account.
          </p>
          <a href="login.html"><button class="btn btn-primary btn-lg">Go to Login</button></a>
        </div>`;
    } catch (err) {
      errBox.textContent = err.message || 'Registration failed';
      errBox.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'Create Account →';
    }
  });
</script>
</body>
</html>
